<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="form.css">
    <link rel="icon" type="image/svg+xml" href="trimspace.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Remova espaços de seu texto facilmente e gratuitamente.">
    <title>TrimText | Ferramenta para cortar espaços de texto</title>
</head>

<body>
    <!--Topo da pagina-->
    <div class="cabeçalho">
        <div class="start">
            <img src="trimspace.svg" class="icone" alt="icone"><h1>TrimSpace</h1>
        </div>
        
        <div class="donate">
            <a href="https://ko-fi.com/th684458" class="ko-fi" title="Make me happy :D" norrefer target="_blank"><i class="fas fa-donate"></i></a>
        </div>
    </div>
    <!--Conteudo central-->

    <h2 class="introd">Retire espaços de seu texto</h2>
    <div class="caixa">
        <textarea name="usuario" id="0" class="texto"  placeholder="Insira um texto"></textarea>
    </div>

    <div class="resp">
        <h3>Seu texto :D</h3>
    </div>

    <div class="caixa">
        <textarea name="usuario" id="1" class="texto"  placeholder="Seu texto sem espaços" readonly></textarea>
    </div>

    <div class="text">
        <h5 id="count">Caracteres:</h5>
    </div>
</body>
<script src="codigo.js"></script>
</html>
